<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MOTO STUNT — 카트 선택</title>
<style>
  :root { --p1: #e8503a; --p2: #3a78e8; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: 'Galmuri11', system-ui, sans-serif; }
  /* bright Mario-Kart-ish backdrop */
  #bg { position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(180deg, #6fd0ff 0%, #4aa8ee 55%, #2f86d8 100%); }
  #bg::after { content: ''; position: absolute; inset: 0; opacity: .14;
    background-image: linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%),
                      linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%);
    background-size: 56px 56px; background-position: 0 0, 28px 28px; }
  #c { position: fixed; inset: 0; z-index: 1; width: 100vw; height: 100vh; display: block; }

  #ui { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
  .title { position: absolute; top: 18px; left: 0; right: 0; text-align: center;
    color: #fff; font-size: 26px; font-weight: 800; letter-spacing: .06em; text-shadow: 0 3px 0 #1c5fae; }

  .panel { position: absolute; top: 96px; width: 320px; padding: 14px;
    border-radius: 16px; background: rgba(255,255,255,.16); border: 3px solid rgba(255,255,255,.5);
    box-shadow: 0 8px 0 rgba(0,0,0,.12); backdrop-filter: blur(2px); }
  .panel.p1 { left: 28px; border-color: var(--p1); }
  .panel.p2 { right: 28px; border-color: var(--p2); }
  .ptag { display: inline-block; font-weight: 800; font-size: 15px; color: #fff; padding: 3px 12px; border-radius: 8px; }
  .p1 .ptag { background: var(--p1); }
  .p2 .ptag { background: var(--p2); }
  .kname { margin: 8px 2px 12px; font-size: 22px; font-weight: 800; color: #fff; text-shadow: 0 2px 0 rgba(0,0,0,.25); min-height: 28px; }
  .strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .chip { position: relative; aspect-ratio: 1; border-radius: 12px; background: rgba(255,255,255,.85);
    display: flex; align-items: center; justify-content: center; font-size: 28px; border: 3px solid transparent;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,.08); transition: transform .08s; }
  .chip .nm { position: absolute; bottom: 3px; left: 0; right: 0; text-align: center; font-size: 9px; color: #5a4f3f; font-weight: 700; }
  .p1 .chip.sel { border-color: var(--p1); transform: translateY(-3px) scale(1.06); box-shadow: 0 0 0 3px #fff, 0 6px 10px rgba(0,0,0,.25); }
  .p2 .chip.sel { border-color: var(--p2); transform: translateY(-3px) scale(1.06); box-shadow: 0 0 0 3px #fff, 0 6px 10px rgba(0,0,0,.25); }
  .chip.locked::after { content: 'OK'; position: absolute; top: -8px; right: -8px; background: #ffd23f; color: #5a3b00;
    font-size: 11px; font-weight: 800; padding: 2px 6px; border-radius: 8px; border: 2px solid #fff; transform: rotate(8deg); }
  .ready { margin-top: 12px; text-align: center; font-size: 18px; font-weight: 800; height: 22px; }
  .p1 .ready { color: #ffe08a; } .p2 .ready { color: #ffe08a; }
  .hint { position: absolute; bottom: 16px; left: 0; right: 0; text-align: center; color: #eaf6ff; font-size: 12px; opacity: .9; }
  .hint b { color: #fff; }

  #count { position: fixed; inset: 0; z-index: 3; display: none; align-items: center; justify-content: center;
    color: #fff; font-size: 160px; font-weight: 900; text-shadow: 0 8px 0 #1c5fae, 0 0 40px rgba(255,255,255,.6); }
  #count.go { color: #ffe23f; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri@latest/dist/galmuri.css" />
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="bg"></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="title">카트 선택 — 둘 다 고르면 출발!</div>
  <div class="panel p1" id="panelP1">
    <span class="ptag">P1</span>
    <div class="kname" id="nameP1"></div>
    <div class="strip" id="stripP1"></div>
    <div class="ready" id="readyP1"></div>
  </div>
  <div class="panel p2" id="panelP2">
    <span class="ptag">P2</span>
    <div class="kname" id="nameP2"></div>
    <div class="strip" id="stripP2"></div>
    <div class="ready" id="readyP2"></div>
  </div>
  <div class="hint">P1 <b>A / D</b> 이동 · <b>LSHIFT</b> 선택　|　P2 <b>← / →</b> 이동 · <b>ENTER</b> 선택</div>
</div>
<div id="count"></div>

<script type="module">
import * as THREE from 'three';
import { VEHICLES, mountRider } from './vehicles.js';

const ICONS = { scooter: '🛵', dirtbike: '🏍️', sportbike: '🏎️', wheelbarrow: '🛒' };
const N = VEHICLES.length;

// ---- 3D stage: two podiums, each shows the highlighted kart + rider --------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.08;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);

scene.add(new THREE.HemisphereLight(0xffffff, 0xbfd8ee, 0.95));
const key = new THREE.DirectionalLight(0xffffff, 2.0); key.position.set(4, 9, 6);
key.castShadow = true; key.shadow.mapSize.set(2048, 2048); key.shadow.bias = -0.0004; key.shadow.radius = 6;
key.shadow.camera.left = -14; key.shadow.camera.right = 14; key.shadow.camera.top = 10; key.shadow.camera.bottom = -6;
scene.add(key);
scene.add(new THREE.DirectionalLight(0xffe9d0, 0.45).translateX(-6).translateY(4).translateZ(-4));
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

const TINT = { p1: 0xffd0c4, p2: 0xc4d8ff };
function podium(x, color) {
  const g = new THREE.Group(); g.position.x = x;
  const base = new THREE.Mesh(new THREE.CylinderGeometry(2.0, 2.2, 0.5, 40), new THREE.MeshStandardMaterial({ color, roughness: 0.6 }));
  base.position.y = 0.25; base.receiveShadow = true; g.add(base);
  const sh = new THREE.Mesh(new THREE.CircleGeometry(2.0, 40), new THREE.ShadowMaterial({ opacity: 0.2 }));
  sh.rotation.x = -Math.PI / 2; sh.position.y = 0.51; g.add(sh);
  scene.add(g); return g;
}
const stageP1 = podium(-4.0, 0xe8503a);
const stageP2 = podium(4.0, 0x3a78e8);

const state = {
  p1: { idx: 0, locked: false, stage: stageP1, kart: null, tint: TINT.p1 },
  p2: { idx: 1, locked: false, stage: stageP2, kart: null, tint: TINT.p2 },
};

function disposeKart(k) { if (!k) return; k.traverse(o => { if (o.isMesh) { o.geometry.dispose?.(); } }); k.parent?.remove(k); }
function rebuild(side) {
  const s = state[side];
  disposeKart(s.kart);
  const v = VEHICLES[s.idx];
  const kart = v.build();
  if (v.seat) mountRider(kart, v.seat, s.tint);
  kart.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
  kart.position.y = 0.5;             // sit on the podium top
  kart.rotation.y = side === 'p1' ? -0.5 : 0.5; // angle inward a touch
  s.kart = kart; s.stage.add(kart);
}

// ---- UI strips -------------------------------------------------------------
function buildStrip(side) {
  const strip = document.getElementById(side === 'p1' ? 'stripP1' : 'stripP2');
  strip.innerHTML = '';
  VEHICLES.forEach((v, i) => {
    const c = document.createElement('div'); c.className = 'chip'; c.dataset.i = i;
    c.innerHTML = `${ICONS[v.key] || '🛞'}<span class="nm">${v.name}</span>`;
    strip.appendChild(c);
  });
}
function refresh(side) {
  const s = state[side];
  document.getElementById(side === 'p1' ? 'nameP1' : 'nameP2').textContent = VEHICLES[s.idx].name;
  const strip = document.getElementById(side === 'p1' ? 'stripP1' : 'stripP2');
  [...strip.children].forEach((c, i) => {
    c.classList.toggle('sel', i === s.idx);
    c.classList.toggle('locked', s.locked && i === s.idx);
  });
  document.getElementById(side === 'p1' ? 'readyP1' : 'readyP2').textContent = s.locked ? '✔ READY' : '';
}

function move(side, dir) {
  const s = state[side]; if (s.locked) return;
  s.idx = (s.idx + dir + N) % N;
  rebuild(side); refresh(side);
}
function toggleLock(side) {
  const s = state[side]; s.locked = !s.locked; refresh(side);
  if (state.p1.locked && state.p2.locked) startCountdown();
}

let counting = false, raceStarted = false;
function startCountdown() {
  if (counting) return; counting = true;
  const el = document.getElementById('count'); el.style.display = 'flex';
  let n = 3; el.textContent = n; el.classList.remove('go');
  const t = setInterval(() => {
    n--;
    if (n > 0) { el.textContent = n; }
    else if (n === 0) { el.textContent = 'GO!'; el.classList.add('go'); }
    else { clearInterval(t); el.style.display = 'none'; onComplete(); }
  }, 800);
}
function onComplete() {
  raceStarted = true;
  // standalone demo: just show the result. In-game this calls back with the picks.
  document.querySelector('.title').textContent = `RACE START!  P1=${VEHICLES[state.p1.idx].name} · P2=${VEHICLES[state.p2.idx].name}`;
  window.__ks && (window.__ks.result = { p1: VEHICLES[state.p1.idx].key, p2: VEHICLES[state.p2.idx].key });
}

addEventListener('keydown', (e) => {
  if (counting) return;
  if (e.code === 'KeyA') move('p1', -1);
  else if (e.code === 'KeyD') move('p1', +1);
  else if (e.code === 'ShiftLeft') toggleLock('p1');
  else if (e.code === 'ArrowLeft') move('p2', -1);
  else if (e.code === 'ArrowRight') move('p2', +1);
  else if (e.code === 'Enter') toggleLock('p2');
});

// ---- framing + loop --------------------------------------------------------
function resize() { renderer.setSize(innerWidth, innerHeight, false); camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();
function loop() {
  if (!raceStarted) { state.p1.kart && (state.p1.kart.rotation.y += 0.006); state.p2.kart && (state.p2.kart.rotation.y += 0.006); }
  camera.position.set(0, 4.0, 13.5); camera.lookAt(0, 1.3, 0);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

buildStrip('p1'); buildStrip('p2');
rebuild('p1'); rebuild('p2'); refresh('p1'); refresh('p2');
loop();

// test hooks
window.__ks = {
  move, lock: toggleLock, state,
  set(side, i) { state[side].idx = i; rebuild(side); refresh(side); },
};
</script>
</body>
</html>
